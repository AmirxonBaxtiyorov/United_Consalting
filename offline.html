<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A2540" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Offline — United Global Consulting</title>
  <link rel="icon" type="image/png" href="GLODAL.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/enhancements.css" />
  <script>
  (function(){
    try{
      var t = localStorage.getItem('ugc_theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    }catch(_){ document.documentElement.setAttribute('data-theme','light'); }
  })();
  </script>
</head>
<body class="page-404">
  <main class="container error-wrap">
    <div class="error-card">
      <div class="error-code" aria-hidden="true">📡</div>
      <h1 id="offlineTitle">Нет подключения к интернету</h1>
      <p id="offlineText">Мы сохранили эту страницу для офлайн-режима. Как только соединение восстановится, обновите страницу.</p>
      <div class="error-actions">
        <button class="btn btn-primary btn-lg" id="reloadBtn" type="button">Обновить</button>
      </div>
    </div>
  </main>

  <script>
  (function(){
    var STRINGS = {
      uz: { title: "Internetga ulanish yoʻq", text: "Biz bu sahifani oflayn rejim uchun saqlab qoʻydik. Ulanish tiklangach, sahifani yangilang.", reload: "Yangilash" },
      ru: { title: "Нет подключения к интернету", text: "Мы сохранили эту страницу для офлайн-режима. Как только соединение восстановится, обновите страницу.", reload: "Обновить" },
      en: { title: "No internet connection", text: "We saved this page for offline mode. Once the connection is back, please refresh.", reload: "Reload" }
    };

    function pickLang(){
      try {
        var u = new URL(location.href);
        var q = u.searchParams.get('lang');
        if (q && STRINGS[q]) return q;
      } catch(_) {}
      try {
        var saved = localStorage.getItem('ugc_lang');
        if (saved && STRINGS[saved]) return saved;
      } catch(_) {}
      var nav = (navigator.language || 'ru').slice(0,2).toLowerCase();
      return STRINGS[nav] ? nav : 'ru';
    }

    var lang = pickLang();
    var s = STRINGS[lang];
    document.documentElement.setAttribute('lang', lang);
    document.getElementById('offlineTitle').textContent = s.title;
    document.getElementById('offlineText').textContent = s.text;
    var btn = document.getElementById('reloadBtn');
    btn.textContent = s.reload;
    btn.addEventListener('click', function(){ location.reload(); });
  })();
  </script>
</body>
</html>
