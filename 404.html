<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A2540" />
  <meta name="robots" content="noindex,nofollow" />
  <title>404 — Страница не найдена | United Global Consulting</title>
  <meta name="description" content="Страница не найдена. Вернитесь на главную United Global Consulting или воспользуйтесь быстрыми ссылками." />
  <link rel="icon" type="image/png" href="GLODAL.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/enhancements.css" />
  <script>
  (function(){
    try{
      var t = localStorage.getItem('ugc_theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    }catch(_){ document.documentElement.setAttribute('data-theme','light'); }
  })();
  </script>
</head>
<body class="page-404">
  <main class="container error-wrap">
    <div class="error-card">
      <div class="error-code" aria-hidden="true">404</div>
      <h1 id="nfTitle">Страница не найдена</h1>
      <p id="nfText">Похоже, эта страница улетела учиться за границу. Попробуйте вернуться на главную или перейти к одному из популярных разделов.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary btn-lg" id="nfHome">← На главную</a>
        <a href="index.html#contact" class="btn btn-whatsapp btn-lg" id="nfContact">Связаться с нами</a>
      </div>
      <div class="error-links">
        <strong id="nfPopular">Популярное:</strong>
        <ul>
          <li><a href="index.html#countries" id="nfLinkCountries">Страны обучения</a></li>
          <li><a href="index.html#services" id="nfLinkServices">Наши услуги</a></li>
          <li><a href="index.html#scholarship" id="nfLinkScholarship">Стипендии и гранты</a></li>
          <li><a href="index.html#faq" id="nfLinkFaq">FAQ</a></li>
          <li><a href="privacy.html" id="nfLinkPrivacy">Политика конфиденциальности</a></li>
        </ul>
      </div>
    </div>
  </main>

  <script>
  (function(){
    var STRINGS = {
      uz: {
        htmlTitle: "404 — Sahifa topilmadi | United Global Consulting",
        title: "Sahifa topilmadi",
        text: "Bu sahifa xorijda oʻqishga uchib ketganga oʻxshaydi. Bosh sahifaga qayting yoki ommabop boʻlimlardan birini tanlang.",
        home: "← Bosh sahifaga",
        contact: "Biz bilan bogʻlanish",
        popular: "Ommabop:",
        countries: "Taʼlim mamlakatlari",
        services: "Xizmatlarimiz",
        scholarship: "Stipendiya va grantlar",
        faq: "Savol-javob",
        privacy: "Maxfiylik siyosati"
      },
      ru: {
        htmlTitle: "404 — Страница не найдена | United Global Consulting",
        title: "Страница не найдена",
        text: "Похоже, эта страница улетела учиться за границу. Попробуйте вернуться на главную или перейти к одному из популярных разделов.",
        home: "← На главную",
        contact: "Связаться с нами",
        popular: "Популярное:",
        countries: "Страны обучения",
        services: "Наши услуги",
        scholarship: "Стипендии и гранты",
        faq: "FAQ",
        privacy: "Политика конфиденциальности"
      },
      en: {
        htmlTitle: "404 — Page Not Found | United Global Consulting",
        title: "Page not found",
        text: "Looks like this page flew abroad to study. Please return to the homepage or try one of the popular sections below.",
        home: "← Back home",
        contact: "Contact us",
        popular: "Popular:",
        countries: "Study destinations",
        services: "Our services",
        scholarship: "Scholarships & grants",
        faq: "FAQ",
        privacy: "Privacy policy"
      }
    };

    function pickLang(){
      try {
        var u = new URL(location.href);
        var q = u.searchParams.get('lang');
        if (q && STRINGS[q]) return q;
      } catch(_) {}
      try {
        var saved = localStorage.getItem('ugc_lang');
        if (saved && STRINGS[saved]) return saved;
      } catch(_) {}
      var nav = (navigator.language || 'ru').slice(0,2).toLowerCase();
      return STRINGS[nav] ? nav : 'ru';
    }

    var lang = pickLang();
    var s = STRINGS[lang];
    document.documentElement.setAttribute('lang', lang);
    document.title = s.htmlTitle;
    document.getElementById('nfTitle').textContent = s.title;
    document.getElementById('nfText').textContent = s.text;
    document.getElementById('nfHome').textContent = s.home;
    document.getElementById('nfContact').textContent = s.contact;
    document.getElementById('nfPopular').textContent = s.popular;
    document.getElementById('nfLinkCountries').textContent = s.countries;
    document.getElementById('nfLinkServices').textContent = s.services;
    document.getElementById('nfLinkScholarship').textContent = s.scholarship;
    document.getElementById('nfLinkFaq').textContent = s.faq;
    document.getElementById('nfLinkPrivacy').textContent = s.privacy;

    function withLang(href){
      try { var u = new URL(href, location.href); u.searchParams.set('lang', lang); return u.pathname + u.search + u.hash; }
      catch(_){ return href; }
    }
    ['nfHome','nfContact','nfLinkCountries','nfLinkServices','nfLinkScholarship','nfLinkFaq','nfLinkPrivacy'].forEach(function(id){
      var el = document.getElementById(id);
      if (el) el.setAttribute('href', withLang(el.getAttribute('href')));
    });
  })();
  </script>
</body>
</html>
