#:schema node_modules/wrangler/config-schema.json
name = "ugc-form-proxy"
main = "src/worker.js"
compatibility_date = "2025-09-01"
workers_dev = true

# KV namespace for rate-limiting. Create via: wrangler kv:namespace create "RATE_LIMIT"
# Then paste the id below.
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "REPLACE_WITH_KV_ID"

# Public bindings (safe to commit — values are *placeholders*):
# [vars]
# ALLOWED_ORIGINS = "https://unitedglobal.uz,https://www.unitedglobal.uz"

# Secrets (set via `wrangler secret put <NAME>`, never commit):
#   TELEGRAM_BOT_TOKEN   — from @BotFather
#   TELEGRAM_CHAT_ID     — group or channel id (e.g. -1001234567890)
#   SHEETS_URL           — Google Apps Script Web App URL (optional)
#   TURNSTILE_SECRET     — Cloudflare Turnstile secret key

[observability]
enabled = true
